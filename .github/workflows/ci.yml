name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

env:
  UV_PYTHON: "3.13"

jobs:
  validate:
    name: Tests, Types, Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python with uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: |
          uv python install "${{ env.UV_PYTHON }}"
          uv sync --python "${{ env.UV_PYTHON }}" --extra dev

      - name: Run tests
        run: |
          uv run pytest -q

      - name: Run type checks
        run: |
          uvx pyright

      - name: Build package
        run: |
          uv build
